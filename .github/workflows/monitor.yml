name: Pareeksha Bhavan Monitor

on:
  # ── Automatic: every 6 hours ──────────────────────────────────────────────
  schedule:
    - cron: "0 */6 * * *"

  # ── Manual: trigger from the Actions tab ──────────────────────────────────
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Send a Telegram test message and exit (verifies secrets)"
        required: false
        default: "false"
        type: boolean
      debug_mode:
        description: "Enable verbose DEBUG-level logging"
        required: false
        default: "false"
        type: boolean

# Prevent two runs from overlapping (e.g. a manual run during a scheduled run)
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: ${{ (inputs.test_mode == 'true' || inputs.test_mode == true) && 'Telegram integration test' || 'Monitor run' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # needed to commit last_seen.json back to main

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ─────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4a. Test mode — verify Telegram integration ───────────────────────
      # Runs only when test_mode=true is selected in the manual dispatch form.
      # Sends a single Telegram message to confirm BOT_TOKEN + CHAT_ID work.
      # Does NOT run the scraper or modify last_seen.json.
      - name: Telegram integration test
        if: ${{ inputs.test_mode == 'true' || inputs.test_mode == true }}
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHAT_ID:    ${{ secrets.CHAT_ID }}
          DEBUG_MODE: ${{ inputs.debug_mode || 'false' }}
        run: |
          echo "Running in TEST MODE — scraper will not run"
          echo "BOT_TOKEN present: ${{ secrets.BOT_TOKEN != '' }}"
          echo "CHAT_ID present:   ${{ secrets.CHAT_ID != '' }}"
          python monitor.py --test ${{ (inputs.debug_mode == 'true' || inputs.debug_mode == true) && '--debug' || '' }}

      # ── 4b. Normal mode — full monitoring cycle ────────────────────────────
      # Runs on the 6-hour cron schedule and manual dispatches without test_mode.
      - name: Run Pareeksha Bhavan monitor
        if: ${{ !(inputs.test_mode == 'true' || inputs.test_mode == true) }}
        env:
          # Telegram
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          # Optional keyword override (set as a GitHub Actions variable, not a secret)
          KEYWORDS:         ${{ vars.KEYWORDS }}
          # Debug flag from manual trigger
          DEBUG_MODE:       ${{ inputs.debug_mode || 'false' }}
        run: |
          python monitor.py ${{ (inputs.debug_mode == 'true' || inputs.debug_mode == true) && '--debug' || '' }}

      # ── 5. Persist last_seen.json (normal mode only) ─────────────────────
      # Commits the updated duplicate-suppression state back to main so the
      # next run knows which notifications have already been sent.
      # Skipped in test mode — test mode never modifies last_seen.json.
      - name: Commit updated last_seen.json
        if: ${{ !(inputs.test_mode == 'true' || inputs.test_mode == true) }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_seen.json
          # Only commit if there is actually a change
          git diff --cached --quiet || \
            git commit -m "chore(data): update last_seen.json [skip ci]"
          git push
