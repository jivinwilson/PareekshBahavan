name: Pareeksha Bhavan Monitor

on:
  # ── Automatic: every 6 hours ──────────────────────────────────────────────
  schedule:
    - cron: "0 */6 * * *"

  # ── Manual: trigger from the Actions tab ──────────────────────────────────
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Enable verbose debug logging"
        required: false
        default: "false"
        type: boolean

# Prevent two runs from overlapping (e.g. a manual run while scheduled runs)
concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Run monitor
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write   # needed to commit last_seen.json back to main

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ─────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run monitor ───────────────────────────────────────────────────
      - name: Run Pareeksha Bhavan monitor
        env:
          # Telegram
          BOT_TOKEN:        ${{ secrets.BOT_TOKEN }}
          CHAT_ID:          ${{ secrets.CHAT_ID }}
          # Email
          EMAIL_HOST:       ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT:       ${{ secrets.EMAIL_PORT }}
          EMAIL_USERNAME:   ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO:         ${{ secrets.EMAIL_TO }}
          # Optional keyword override (set as a GitHub Actions variable, not a secret)
          KEYWORDS:         ${{ vars.KEYWORDS }}
          # Debug flag from manual trigger
          DEBUG_MODE:       ${{ inputs.debug_mode || 'false' }}
        run: python monitor.py

      # ── 5. Persist last_seen.json ────────────────────────────────────────
      # Commits the updated duplicate-suppression state back to main so the
      # next run knows which notifications have already been sent.
      - name: Commit updated last_seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_seen.json
          # Only commit if there is actually a change
          git diff --cached --quiet || \
            git commit -m "chore(data): update last_seen.json [skip ci]"
          git push
