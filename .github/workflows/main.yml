name: Pareeksha Bhavan Monitor

on:
  workflow_dispatch:

  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python
        run: python --version

      - name: Test GitHub Actions
        run: |
          echo "GitHub Actions is working!"
          echo "Pareeksha Bhavan Monitor started."
